version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Fetching API Gateway URL from AWS SSM Parameter Store..."
        - export ENVIRONMENT=${ENV:-dev}
        - export API_BASE_URL=$(aws ssm get-parameter --name "/fc/$ENVIRONMENT/api_endpoint" --region eu-central-1 --query "Parameter.Value" --output text)
        - echo "Generating config.js for environment $ENVIRONMENT..."
        - |
          cat <<EOF > public/config.js
          window.APP_CONFIG = {
            API_BASE_URL: '${API_BASE_URL}',
            UPLOAD_PATH: '/api/upload-url',
            AWS_REGION: 'eu-central-1',
            APP_NAME: 'Financial Concierge'
          };
          EOF
    build:
      commands:
        - npm ci
        - npm run build
        - echo "Frontend build complete"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
